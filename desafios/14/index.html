<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/media-query.css">
</head>
<body>
    <main class="login">
        <section id="img">
        
        </section>
        <section id="form">
            <h1>Login</h1>
            <p>Seja bem-vindo(a) de volta!</p>
            <form action="login.php" method="post" autocomplete="on">
                <div class="field">
                    <i class="fa-solid fa-user"></i>
                    <input type="email" id="ilogin" name="login" placeholder="Digite seu e-mail" autocomplete="email" required maxlength="30">
                    <label for="ilogin">Login</label>
                </div>
                <div class="field">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="isenha" name="senha" placeholder="Digite sua senha" autocomplete="current-password" required minlength="8" maxlength="30">
                    <label for="isenha">Senha</label>
                </div>

                <input type="submit" value="Entrar">
                <a href="#">Esqueci a senha</a>
            </form>
        </section>
    </main>
</body>
</html>
